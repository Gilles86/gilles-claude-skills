# ============================================================================
# REAL EXEMPLAR — verbatim from a working project.
#
# Provenance: ~/git/abstract_values/environment_apple_silicon.yml @ d9cdc4e
#
# What to study (the cluster ↔ Mac differences):
#   * `tensorflow==2.17.0` (not 2.20 as on the cluster) — abstract_values
#     pins TF 2.17 here because that's the highest version `tensorflow-metal`
#     supports for Apple-Silicon GPU acceleration. The cluster env runs
#     TF 2.20 because it doesn't need metal.
#   * `tensorflow-metal` adds Metal-Performance-Shaders backend so braincoder
#     fits use the M-series GPU. Optional — drop it if you're cluster-only.
#   * `jax` and `torch` are CPU-only here. The pattern is: do PRF dev on
#     local M1/M2 (CPU is plenty fast for a few hundred voxels) and ship
#     full-brain fits to the cluster.
#   * Same Keras 3.13.2 + braincoder@keras-backend branch as the cluster env
#     so the same model code runs locally and remotely.
#   * `glmsingle` is from PyPI here (the package is named differently than
#     the upstream repo's `GLMsingle`).
# ============================================================================
name: abstract_values
channels:
  - conda-forge
dependencies:
  - python=3.11          # 3.11+ needed for keras>=3.13
  - pip
  # Scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - ipykernel
  - ipywidgets
  - pingouin
  # Neuroimaging
  - nibabel
  - nilearn
  - nipype
  - pip:
      # Keras 3 + TF backend with Metal GPU acceleration
      - tensorflow==2.17.0
      - tensorflow-metal          # Apple Silicon GPU
      - tensorflow-probability==0.25.0
      # Multi-backend extras (CPU only on Mac — use cluster for JAX/Torch GPU)
      - jax
      - torch
      - keras==3.13.2
      # Braincoder (keras-backend branch)
      - git+https://github.com/Gilles86/braincoder.git@keras-backend
      # fMRI analysis
      - glmsingle
      - neuropythy
      - pybids
      - pymc
      - tqdm
      - -e .
