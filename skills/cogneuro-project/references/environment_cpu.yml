# CPU conda environment for local Linux dev and cluster CPU jobs
# (GLMsingle, surface sampling, anything non-GPU). On Apple Silicon use
# environment_apple_silicon.yml instead.
#
# Build:
#   conda env create -f create_env/environment_cpu.yml
#   conda activate <project>_cpu
#   pip install -e libs/braincoder     # editable submodule for dev
#   pip install -e .                    # the project package
#
# On the cluster:
#   sbatch create_env/create_cpu_env.sh
#
# Stack: Python 3.12 + Keras 3.14 + TF 2.20 CPU. One-for-one match with
# environment_cuda.yml so the same code runs both places.

name: <project>_cpu
channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  # Scientific Python core
  - numpy<2.3
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - statsmodels
  - tqdm
  - pyyaml
  - pingouin

  # Neuroimaging
  - nibabel
  - nilearn
  - pybids
  - nipype

  # Notebook + dev
  - jupyterlab
  - ipykernel
  - ipywidgets
  - pytest

  - pip:
      - "tensorflow-cpu==2.20.*"
      - "keras>=3.13,<4"
      - "tf_keras>=2.20"
      - "tensorflow-probability>=0.25"
      - protobuf>=4.21

      - "braincoder @ git+https://github.com/Gilles86/braincoder.git@main"
      # - "bauer @ git+https://github.com/Gilles86/bauer.git@main"

      - "glmsingle @ git+https://github.com/cvnlab/GLMsingle.git@main"
      - pymc
      - neuropythy
