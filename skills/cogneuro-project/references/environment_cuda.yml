# ============================================================================
# REAL EXEMPLAR — verbatim from a working project.
#
# Provenance: ~/git/abstract_values/environment_linux.yml @ 1e0ef0e
#             (abstract_values cluster CUDA env, A100/H100 nodes on sciencecluster)
#
# What to study:
#   * Python 3.11 + Keras 3.13.2 + TF 2.20 + jax[cuda12] + torch — the
#     multi-backend stack braincoder's keras-backend branch is built for.
#   * `tensorflow==2.20.0` brings its own CUDA libs via pip wheels; no
#     `module load cuda/...` needed on the cluster.
#   * `jax[cuda12]` adds GPU-accelerated JAX; the package extra installs the
#     matching jaxlib + nvidia-* wheels.
#   * `torch` is CPU here — swap to `torch+cu121 --extra-index-url ...` if
#     you want GPU torch too.
#   * braincoder is pinned to the `keras-backend` branch via git URL.
#     For dev iteration, do `pip install -e libs/braincoder` post-build to
#     shadow this with the local submodule.
#   * `GLMsingle` is pip-from-git (not on PyPI).
#   * `-e .` installs the project package editable.
#   * No `numpy<2.3` pin here — abstract_values runs on numpy 2.x.
#
# NOTE: The skill's text still describes a Python 3.12 stack as canonical;
# abstract_values is on 3.11 because keras 3.13.2 + tf 2.20 was the last
# combo that pinned cleanly for them. Either works; pick by what the project
# already uses.
#
# Build on a GPU compute node (interactive or via sbatch) so the cuda12
# wheels link against the right NVIDIA driver:
#   srun --partition=lowprio --gres=gpu:1 --pty bash
#   conda env create -f environment_linux.yml -p $HOME/data/conda/envs/<project>
# ============================================================================
name: abstract_values
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - ipykernel
  - ipywidgets
  - pingouin
  # Neuroimaging
  - nibabel
  - nilearn
  - nipype
  - pip:
      # Keras 3 + multi-backend ML
      - tensorflow==2.20.0
      - tensorflow-probability==0.25.0
      - tf-keras
      - jax[cuda12]           # GPU-accelerated JAX on cluster (CUDA 12)
      - torch                 # PyTorch (CPU; add torch+cu121 for GPU)
      - keras==3.13.2
      # Braincoder (keras-backend branch)
      - git+https://github.com/Gilles86/braincoder.git@keras-backend
      # fMRI analysis
      - git+https://github.com/cvnlab/GLMsingle.git
      - pybids
      - pymc
      - tqdm
      - -e .
