# CUDA conda environment for cluster GPU jobs (PRF fits, decoding,
# GP-prior-style empirical-Bayes fitters).
#
# Build on a GPU compute node so the bundled CUDA wheels link against
# the right NVIDIA driver:
#
#   sbatch create_env/create_gpu_env.sh
#
# Installed env name on cluster: <project>_cuda
#
# Stack: Python 3.12 + Keras 3.14 + TF 2.20 — matches braincoder's
# pinned env. Verified on A100-SXM4-80GB (compute capability 8.0) on
# 2026-05-18. `tensorflow[and-cuda]==2.20.*` bundles its own CUDA libs
# via pip wheels, so no `module load cuda/...` is required.
#
# A JAX-backend alternative is in environment_cuda_jax.yml — same
# braincoder behavior with `KERAS_BACKEND=jax`, useful as a fallback if
# a future driver upgrade breaks the TF route.

name: <project>_cuda
channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  # Scientific Python core
  - numpy<2.3
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - statsmodels
  - tqdm
  - pyyaml
  - pingouin

  # Neuroimaging
  - nibabel
  - nilearn
  - pybids
  - nipype

  - jupyterlab
  - ipykernel
  - ipywidgets
  - pytest

  - pip:
      # Keras 3 / TF 2.20 GPU stack — bundled CUDA via pip wheels.
      - "tensorflow[and-cuda]==2.20.*"
      - "keras>=3.13,<4"
      - "tf_keras>=2.20"                  # tensorflow-probability shim
      - "tensorflow-probability>=0.25"
      - protobuf>=4.21

      # In-house libs. Pin to the git URL for env-builder reproducibility,
      # then `pip install -e libs/braincoder` post-build for dev iteration.
      - "braincoder @ git+https://github.com/Gilles86/braincoder.git@main"
      # - "bauer @ git+https://github.com/Gilles86/bauer.git@main"

      # Optional / common extras:
      - "glmsingle @ git+https://github.com/cvnlab/GLMsingle.git@main"
      - pymc
      - neuropythy
